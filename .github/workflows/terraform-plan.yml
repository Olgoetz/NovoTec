name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "infrastructure/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure
    env:
      TF_VAR_NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.TF_VAR_NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
      TF_VAR_GOOGLE_TAG_MANAGER_ID: ${{ secrets.TF_VAR_GOOGLE_TAG_MANAGER_ID }}
      TF_VAR_CONTENTFUL_SPACE_ID: ${{ secrets.TF_VAR_CONTENTFUL_SPACE_ID }}
      TF_VAR_CONTENTFUL_ACCESS_TOKEN: ${{ secrets.TF_VAR_CONTENTFUL_ACCESS_TOKEN }}
      TF_VAR_CONTENTFUL_CMA_TOKEN: ${{ secrets.TF_VAR_CONTENTFUL_CMA_TOKEN }}
      TF_VAR_RESEND_API_KEY: ${{ secrets.TF_VAR_RESEND_API_KEY }}
      TF_VAR_EDGE_STORE_ACCESS_KEY: ${{ secrets.TF_VAR_EDGE_STORE_ACCESS_KEY }}
      TF_VAR_EDGE_STORE_SECRET_KEY: ${{ secrets.TF_VAR_EDGE_STORE_SECRET_KEY }}
      VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "latest"

      - name: Terraform Format
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false
        continue-on-error: true

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Terraform Plan')
            );

            const output = `### Terraform Plan 📋

            #### Format: \`${{ steps.fmt.outcome }}\`
            #### Init: \`${{ steps.init.outcome }}\`
            #### Validate: \`${{ steps.validate.outcome }}\`
            #### Plan: \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan Output</summary>

            \`\`\`terraform
            ${process.env.PLAN}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            if (botComment) {
              github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: output
              });
            } else {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output
              });
            }
        env:
          PLAN: "${{ steps.plan.outputs.stdout }}"

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1
